  <style>
    /* ---- Flow diagram styles ---- */
    .decision-flow {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      padding: var(--space-6);
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      margin: var(--space-6) 0;
      overflow-x: auto;
    }
    .flow-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-3) var(--space-5);
      border: 2px solid var(--border-light);
      border-radius: var(--radius-lg);
      min-width: 130px;
      text-align: center;
      flex-shrink: 0;
    }
    .flow-node-title {
      font-weight: 700;
      font-size: var(--text-sm);
      line-height: var(--leading-snug);
    }
    .flow-node-desc {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      line-height: var(--leading-relaxed);
    }
    .flow-node.flow-action-allow { border-color: var(--zt-allow); background: rgba(22,163,74,0.06); }
    .flow-node.flow-action-block { border-color: var(--zt-block); background: rgba(220,38,38,0.06); }
    .flow-node.flow-action-challenge { border-color: var(--zt-challenge); background: rgba(217,119,6,0.06); }
    .flow-node.flow-action-escalate { border-color: var(--zt-escalate); background: rgba(124,58,237,0.06); }
    .flow-node.flow-action-pending { border-color: var(--zt-pending); background: rgba(8,145,178,0.06); }
    .flow-arrow {
      font-size: var(--text-lg);
      color: var(--text-tertiary);
      text-align: center;
    }
    .flow-arrow-down {
      display: block;
      text-align: center;
      color: var(--text-tertiary);
      font-size: var(--text-lg);
    }

    /* ---- Filter chain styles ---- */
    .filter-chain {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin: var(--space-6) 0;
    }
    .filter-chain-item {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
    }
    .filter-chain-order {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: var(--radius-full);
      background: var(--brand-gradient);
      color: white;
      font-size: var(--text-xs);
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .filter-chain-body {
      flex: 1;
      min-width: 0;
    }
    .filter-chain-name {
      font-weight: 600;
      font-size: var(--text-sm);
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    .filter-chain-desc {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      line-height: var(--leading-relaxed);
    }
    .filter-chain-connector {
      text-align: center;
      color: var(--text-tertiary);
      font-size: var(--text-sm);
      padding: 2px 0;
    }

    /* ---- Arch flow (from overview.html) ---- */
    .arch-flow {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin: var(--space-6) 0;
    }
    .arch-flow-node {
      padding: var(--space-3) var(--space-5);
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: var(--text-sm);
      text-align: center;
      max-width: 420px;
      width: 100%;
      line-height: var(--leading-snug);
    }
    .arch-flow-node--primary {
      background: var(--brand-primary);
      color: white;
    }
    .arch-flow-node--secondary {
      background: var(--brand-secondary);
      color: white;
    }
    .arch-flow-node--filter {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 2px solid var(--border-medium);
    }
    .arch-flow-node--agent {
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
      color: white;
    }
    .arch-flow-connector {
      width: 2px;
      height: 24px;
      background: var(--border-medium);
    }
    .arch-flow-detail {
      font-size: var(--text-xs);
      font-weight: 400;
      opacity: 0.9;
      margin-top: 2px;
      display: block;
    }
    .arch-flow-badge {
      display: inline-block;
      margin-top: var(--space-3);
      padding: var(--space-1) var(--space-4);
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
      color: white;
      border-radius: var(--radius-full);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    /* ---- Comparison grid ---- */
    .comparison-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4);
      margin: var(--space-6) 0;
    }
    @media (max-width: 768px) {
      .comparison-grid { grid-template-columns: 1fr; }
    }
    .comparison-card {
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      background: var(--bg-primary);
    }
    .comparison-card h3 {
      font-size: var(--text-base);
      font-weight: 700;
      margin: 0 0 var(--space-2);
    }
    .comparison-card p {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      margin: 0 0 var(--space-3);
    }
    .comparison-card ul {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      padding-left: var(--space-5);
      line-height: var(--leading-loose);
      margin: 0;
    }
    .comparison-card.highlight {
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 1px var(--brand-primary);
    }

    /* ---- Enforcement cards ---- */
    .enforcement-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-4);
      margin: var(--space-6) 0;
    }
    @media (max-width: 640px) {
      .enforcement-grid { grid-template-columns: 1fr; }
    }
    .enforcement-card {
      border: 2px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      background: var(--bg-primary);
    }
    .enforcement-card h4 {
      font-size: var(--text-sm);
      font-weight: 700;
      margin: 0 0 var(--space-2);
    }

    /* ---- Handler badge ---- */
    .handler-badge {
      display: inline-block;
      padding: 2px var(--space-2);
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 600;
    }

    /* ---- Zero Trust Pipeline Diagram ---- */
    .ztpipe {
      position: relative;
      margin: var(--space-8) 0;
      padding-left: 64px;
    }
    .ztpipe::before {
      content: '';
      position: absolute;
      left: 23px;
      top: 28px;
      bottom: 28px;
      width: 2px;
      background: linear-gradient(180deg, #a855f7, #6366f1 40%, #06b6d4 70%, #f59e0b);
      border-radius: 1px;
    }
    .ztpipe-step {
      position: relative;
      margin-bottom: 28px;
    }
    .ztpipe-step:last-child { margin-bottom: 0; }
    .ztpipe-num {
      position: absolute;
      left: -64px;
      top: 8px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 700;
      color: white;
      z-index: 1;
      box-shadow: 0 3px 12px rgba(0,0,0,0.15);
    }
    .ztpipe-head {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 10px;
      padding-top: 4px;
    }
    .ztpipe-title {
      font-size: 18px;
      font-weight: 700;
    }
    .ztpipe-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 3px;
      letter-spacing: 0.04em;
    }
    .ztpipe-card {
      display: flex;
      align-items: stretch;
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.04);
    }
    .ztpipe-node {
      flex: 1;
      padding: 16px 20px;
      min-width: 0;
    }
    .ztpipe-node + .ztpipe-node { border-left: 1px solid var(--border-light); }
    .ztpipe-fn {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .ztpipe-desc {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-secondary);
    }
    .ztpipe-impl {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 8px;
      opacity: 0.65;
    }
    .ztpipe-arr {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      flex-shrink: 0;
      background: var(--bg-secondary);
    }
    .ztpipe-arr svg {
      width: 16px;
      height: 16px;
      stroke: var(--text-tertiary);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.35;
    }
    .ztpipe-conn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 0;
      margin-bottom: 28px;
    }
    .ztpipe-conn svg {
      width: 32px;
      height: 32px;
      opacity: 0.45;
    }
    .ztpipe-results {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .ztpipe-action {
      text-align: center;
      padding: 18px 8px;
      border-radius: 10px;
      border: 2px solid;
    }
    .ztpipe-action-name {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.06em;
    }
    .ztpipe-action-sub {
      font-size: 11px;
      margin-top: 4px;
      color: var(--text-secondary);
    }
    /* Phase colors */
    .ztpipe-step--1 { padding: 20px; background: linear-gradient(135deg, rgba(168,85,247,0.04), rgba(168,85,247,0.08)); border: 1px solid rgba(168,85,247,0.15); border-radius: 16px; }
    .ztpipe-step--1 .ztpipe-num { background: linear-gradient(135deg, #a855f7, #7c3aed); width: 56px; height: 56px; font-size: 17px; top: 16px; box-shadow: 0 4px 20px rgba(168,85,247,0.35); }
    .ztpipe-step--1 .ztpipe-title { color: #6d28d9; font-size: 20px; }
    .ztpipe-step--1 .ztpipe-badge { color: #7c3aed; background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.3); }
    .ztpipe-step--1 .ztpipe-fn { color: #6d28d9; font-size: 17px; }
    .ztpipe-step--1 .ztpipe-card { border-left: 4px solid rgba(168,85,247,0.5); box-shadow: 0 4px 24px rgba(168,85,247,0.1); }
    .ztpipe-step--2 { padding: 20px; background: linear-gradient(135deg, rgba(99,102,241,0.04), rgba(99,102,241,0.08)); border: 1px solid rgba(99,102,241,0.15); border-radius: 16px; }
    .ztpipe-step--2 .ztpipe-num { background: linear-gradient(135deg, #6366f1, #4338ca); width: 56px; height: 56px; font-size: 17px; top: 16px; box-shadow: 0 4px 20px rgba(99,102,241,0.35); }
    .ztpipe-step--2 .ztpipe-title { color: #4338ca; font-size: 20px; }
    .ztpipe-step--2 .ztpipe-badge { color: #4f46e5; background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.3); }
    .ztpipe-step--2 .ztpipe-fn { color: #4338ca; font-size: 17px; }
    .ztpipe-step--2 .ztpipe-card { border-left: 4px solid rgba(99,102,241,0.5); box-shadow: 0 4px 24px rgba(99,102,241,0.1); }
    .ztpipe-step--3 { padding: 20px; background: linear-gradient(135deg, rgba(6,182,212,0.04), rgba(6,182,212,0.08)); border: 1px solid rgba(6,182,212,0.15); border-radius: 16px; }
    .ztpipe-step--3 .ztpipe-num { background: linear-gradient(135deg, #06b6d4, #0891b2); width: 56px; height: 56px; font-size: 17px; top: 16px; box-shadow: 0 4px 20px rgba(6,182,212,0.35); }
    .ztpipe-step--3 .ztpipe-title { color: #0e7490; font-size: 20px; }
    .ztpipe-step--3 .ztpipe-badge { color: #0891b2; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); }
    .ztpipe-step--3 .ztpipe-fn { color: #0e7490; font-size: 17px; }
    .ztpipe-step--3 .ztpipe-card { border-left: 4px solid rgba(6,182,212,0.5); box-shadow: 0 4px 24px rgba(6,182,212,0.1); }
    .ztpipe-step--4 { padding: 20px; background: linear-gradient(135deg, rgba(245,158,11,0.04), rgba(245,158,11,0.08)); border: 1px solid rgba(245,158,11,0.15); border-radius: 16px; }
    .ztpipe-step--4 .ztpipe-num { background: linear-gradient(135deg, #f59e0b, #d97706); width: 56px; height: 56px; font-size: 17px; top: 16px; box-shadow: 0 4px 20px rgba(245,158,11,0.35); }
    .ztpipe-step--4 .ztpipe-title { color: #92400e; font-size: 20px; }
    /* Action colors */
    .ztpipe-action--allow { border-color: var(--zt-allow); background: rgba(22,163,74,0.05); }
    .ztpipe-action--allow .ztpipe-action-name { color: var(--zt-allow); }
    .ztpipe-action--block { border-color: var(--zt-block); background: rgba(220,38,38,0.05); }
    .ztpipe-action--block .ztpipe-action-name { color: var(--zt-block); }
    .ztpipe-action--challenge { border-color: var(--zt-challenge); background: rgba(245,158,11,0.05); }
    .ztpipe-action--challenge .ztpipe-action-name { color: var(--zt-challenge); }
    .ztpipe-action--escalate { border-color: var(--zt-escalate); background: rgba(168,85,247,0.05); }
    .ztpipe-action--escalate .ztpipe-action-name { color: var(--zt-escalate); }

    /* ---- Callout styles ---- */
    .callout-danger {
      background: rgba(220,38,38,0.06);
      border-left: 4px solid var(--zt-block);
      padding: var(--space-4);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      margin: var(--space-4) 0;
      font-size: var(--text-sm);
    }
    .callout-info {
      background: rgba(8,145,178,0.06);
      border-left: 4px solid var(--color-info);
      padding: var(--space-4);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      margin: var(--space-4) 0;
      font-size: var(--text-sm);
    }

    /* ---- Blind Spot Compare (Section 1) ---- */
    .blind-spot-compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-6);
      margin: var(--space-8) 0;
    }
    @media (max-width: 768px) {
      .blind-spot-compare { grid-template-columns: 1fr; }
    }
    .blind-spot-side {
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      text-align: center;
    }
    .blind-spot-side--before {
      background: linear-gradient(135deg, rgba(220,38,38,0.04), rgba(220,38,38,0.08));
      border: 1px solid rgba(220,38,38,0.2);
    }
    .blind-spot-side--after {
      background: linear-gradient(135deg, rgba(6,182,212,0.04), rgba(6,182,212,0.08));
      border: 1px solid rgba(6,182,212,0.2);
    }
    .blind-spot-title {
      font-size: var(--text-lg);
      font-weight: 700;
      margin-bottom: var(--space-4);
    }
    .blind-spot-gate {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-md);
      font-weight: 700;
      font-size: var(--text-sm);
      margin-bottom: var(--space-3);
    }
    .blind-spot-gate--pass { background: rgba(22,163,74,0.15); color: #16a34a; }
    .blind-spot-zone {
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin-top: var(--space-3);
      font-size: var(--text-sm);
      line-height: var(--leading-relaxed);
    }
    .blind-spot-zone--empty {
      background: rgba(220,38,38,0.06);
      border: 2px dashed rgba(220,38,38,0.25);
      color: var(--zt-block);
    }
    .blind-spot-zone--protected {
      background: rgba(6,182,212,0.06);
      border: 2px solid rgba(6,182,212,0.25);
      color: var(--brand-primary);
    }
    .blind-spot-layer {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: 6px var(--space-3);
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: 600;
      background: rgba(6,182,212,0.1);
      margin: 3px 0;
      width: 100%;
      justify-content: center;
    }
    .philosophy-quote {
      text-align: center;
      padding: var(--space-6) var(--space-8);
      margin: var(--space-6) 0;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(99,102,241,0.04), rgba(6,182,212,0.06));
      border: 1px solid rgba(99,102,241,0.15);
    }
    .philosophy-quote p {
      font-size: var(--text-lg);
      font-style: italic;
      color: var(--text-primary);
      margin: 0;
      line-height: var(--leading-relaxed);
    }

    /* ---- Dual Flow (Section 2) ---- */
    .dual-flow {
      display: grid;
      grid-template-columns: 1fr 80px 1fr;
      gap: 0;
      margin: var(--space-8) 0;
      min-height: 400px;
    }
    @media (max-width: 768px) {
      .dual-flow { grid-template-columns: 1fr; min-height: auto; }
      .dual-flow-bridge { flex-direction: row !important; height: 60px !important; width: 100% !important; border-left: none !important; border-top: 2px dashed rgba(220,38,38,0.3) !important; }
      .dual-flow-bridge-line { width: 0 !important; height: 0 !important; }
    }
    .dual-flow-col {
      display: flex;
      flex-direction: column;
      gap: 0;
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      position: relative;
    }
    .dual-flow-col--a {
      background: linear-gradient(135deg, rgba(168,85,247,0.03), rgba(168,85,247,0.07));
      border: 1px solid rgba(168,85,247,0.15);
    }
    .dual-flow-col--b {
      background: linear-gradient(135deg, rgba(6,182,212,0.03), rgba(6,182,212,0.07));
      border: 1px solid rgba(6,182,212,0.15);
    }
    .dual-flow-header {
      text-align: center;
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-3);
      border-bottom: 1px solid var(--border-light);
    }
    .dual-flow-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .dual-flow-label--a { color: #7c3aed; }
    .dual-flow-label--b { color: #0891b2; }
    .dual-flow-name {
      font-size: var(--text-base);
      font-weight: 700;
      margin-bottom: 2px;
    }
    .dual-flow-mode {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
    }
    .dual-flow-step {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-3);
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      margin-bottom: 2px;
    }
    .dual-flow-step-icon {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: white;
    }
    .dual-flow-step-icon--a { background: linear-gradient(135deg, #a855f7, #7c3aed); }
    .dual-flow-step-icon--b { background: linear-gradient(135deg, #06b6d4, #0891b2); }
    .dual-flow-step-body { flex: 1; min-width: 0; }
    .dual-flow-step-name {
      font-size: var(--text-sm);
      font-weight: 700;
      margin-bottom: 2px;
    }
    .dual-flow-step-desc {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      line-height: var(--leading-relaxed);
    }
    .dual-flow-step-impl {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 3px;
    }
    .dual-flow-arrow {
      text-align: center;
      color: var(--text-tertiary);
      font-size: var(--text-sm);
      padding: 2px 0;
    }
    .dual-flow-bridge {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .dual-flow-bridge-line {
      width: 2px;
      flex: 1;
      background: repeating-linear-gradient(180deg, rgba(220,38,38,0.3), rgba(220,38,38,0.3) 6px, transparent 6px, transparent 12px);
    }
    .dual-flow-bridge-badge {
      padding: var(--space-2) var(--space-3);
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      color: white;
      border-radius: var(--radius-md);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      white-space: nowrap;
      z-index: 1;
    }
    .dual-flow-bridge-sub {
      font-size: 10px;
      color: var(--text-tertiary);
      text-align: center;
      margin-top: 4px;
      line-height: 1.3;
    }

    /* ---- Scenario Split (Section 3) ---- */
    .scenario-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-5);
      margin: var(--space-6) 0;
    }
    @media (max-width: 640px) {
      .scenario-split { grid-template-columns: 1fr; }
    }
    .scenario-column {
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .scenario-column--good {
      border: 2px solid rgba(22,163,74,0.3);
    }
    .scenario-column--bad {
      border: 2px solid rgba(220,38,38,0.3);
    }
    .scenario-header {
      padding: var(--space-3) var(--space-4);
      font-weight: 700;
      font-size: var(--text-sm);
      text-align: center;
    }
    .scenario-header--good { background: rgba(22,163,74,0.1); color: #16a34a; }
    .scenario-header--bad { background: rgba(220,38,38,0.1); color: #dc2626; }
    .scenario-step {
      padding: var(--space-3) var(--space-4);
      border-top: 1px solid var(--border-light);
    }
    .scenario-step-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }
    .scenario-step-content {
      font-size: var(--text-sm);
      line-height: var(--leading-relaxed);
      color: var(--text-secondary);
    }
    .scenario-badge {
      display: inline-block;
      padding: 2px var(--space-2);
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 700;
      margin-top: 4px;
    }
    .scenario-badge--allow { background: rgba(22,163,74,0.15); color: #16a34a; }
    .scenario-badge--block { background: rgba(220,38,38,0.15); color: #dc2626; }
    .scenario-badge--normal { background: rgba(22,163,74,0.1); color: #16a34a; }
    .scenario-badge--anomaly { background: rgba(220,38,38,0.1); color: #dc2626; }
    .scenario-verdict {
      padding: var(--space-4);
      text-align: center;
      font-weight: 700;
    }
    .scenario-verdict--allow { background: rgba(22,163,74,0.08); color: #16a34a; }
    .scenario-verdict--block { background: rgba(220,38,38,0.08); color: #dc2626; }
    .scenario-conclusion {
      text-align: center;
      padding: var(--space-5) var(--space-6);
      margin: var(--space-6) 0;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(99,102,241,0.04), rgba(6,182,212,0.06));
      border: 1px solid rgba(99,102,241,0.15);
      font-size: var(--text-sm);
      line-height: var(--leading-relaxed);
      color: var(--text-primary);
    }

    /* ---- Bridge Highlight (Section 4) ---- */
    .bridge-highlight {
      background: linear-gradient(135deg, rgba(99,102,241,0.03), rgba(6,182,212,0.05));
      border: 2px solid var(--brand-primary);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      margin: var(--space-6) 0;
    }
    .bridge-highlight h3 {
      color: var(--brand-primary);
      margin-top: 0;
    }
    .authority-transform-table {
      width: 100%;
      border-collapse: collapse;
      margin: var(--space-4) 0;
    }
    .authority-transform-table th,
    .authority-transform-table td {
      padding: var(--space-2) var(--space-3);
      text-align: left;
      font-size: var(--text-sm);
      border-bottom: 1px solid var(--border-light);
    }
    .authority-transform-table th {
      font-weight: 700;
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-tertiary);
    }
    .auth-arrow {
      color: var(--text-tertiary);
      font-size: var(--text-sm);
    }

    /* ---- Handler chain badge ---- */
    .handler-order {
      display: inline-block;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      background: rgba(99,102,241,0.1);
      color: #4f46e5;
      margin-right: var(--space-2);
    }

    /* ---- Unblock flow card ---- */
    .unblock-card {
      border: 2px solid var(--brand-primary);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      background: var(--bg-primary);
      margin-top: var(--space-4);
    }
  </style>
</head>
