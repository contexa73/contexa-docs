<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Engineering | Contexa Docs</title>
  <meta name="description" content="How Contexa turns an authenticated HTTP request from a human or an agent into a structured prompt that an LLM can reason about. Six stages: collect, process, harden, standardise, compose, calibrate.">
  <link rel="stylesheet" href="/assets/css/fonts.css">
  <link rel="stylesheet" href="/assets/css/variables.css">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/code.css">
  <link rel="stylesheet" href="/assets/css/docs.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
  <style>
    /* ── Callouts ── */
    .callout-info {
      background: var(--brand-primary-light);
      border-left: 3px solid var(--brand-primary);
      padding: var(--space-4) var(--space-5);
      border-radius: var(--radius-md);
      margin: var(--space-5) 0;
      font-size: var(--text-sm);
      line-height: var(--leading-relaxed);
      color: var(--text-primary);
    }

    /* ── Six-stage pipeline (refined) ── */
    .pipeline-six {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: var(--space-2);
      margin: var(--space-8) 0;
      position: relative;
    }
    @media (max-width: 900px) {
      .pipeline-six { grid-template-columns: repeat(3, 1fr); gap: var(--space-3); }
    }
    @media (max-width: 520px) {
      .pipeline-six { grid-template-columns: repeat(2, 1fr); }
    }
    .pipeline-stage {
      position: relative;
      padding: var(--space-4) var(--space-3) var(--space-3);
      text-align: center;
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      transition: transform var(--transition-fast), box-shadow var(--transition-fast), border-color var(--transition-fast);
    }
    .pipeline-stage:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: var(--border-brand);
    }
    .pipeline-stage-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: var(--brand-gradient);
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      margin-bottom: var(--space-2);
      box-shadow: var(--shadow-brand);
    }
    .pipeline-stage-name {
      font-weight: 700;
      font-size: var(--text-sm);
      color: var(--text-primary);
      letter-spacing: var(--tracking-tight);
      margin-bottom: 2px;
    }
    .pipeline-stage-pkg {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--brand-primary);
      opacity: 0.8;
      margin-bottom: var(--space-2);
      word-break: break-all;
      line-height: var(--leading-snug);
    }
    .pipeline-stage-desc {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: var(--leading-relaxed);
    }

    /* ── Three stamp cards ── */
    .stamp-trio {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4);
      margin: var(--space-5) 0;
    }
    @media (max-width: 768px) {
      .stamp-trio { grid-template-columns: 1fr; }
    }
    .stamp-card {
      position: relative;
      padding: var(--space-5);
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
    }
    .stamp-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }
    .stamp-card--auth::before { background: var(--brand-primary); }
    .stamp-card--authz::before { background: var(--zt-challenge); }
    .stamp-card--deleg::before { background: var(--brand-secondary); }
    .stamp-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .stamp-card-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-3);
    }
    .stamp-card--auth .stamp-card-icon { background: var(--brand-primary); }
    .stamp-card--authz .stamp-card-icon { background: var(--zt-challenge); }
    .stamp-card--deleg .stamp-card-icon { background: var(--brand-secondary); }
    .stamp-card-title {
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    .stamp-card-sub {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-bottom: var(--space-3);
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
    }
    .stamp-card ul {
      list-style: none;
      padding: 0;
      margin: 0;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      line-height: var(--leading-loose);
    }
    .stamp-card ul li {
      padding-left: var(--space-3);
      position: relative;
    }
    .stamp-card ul li::before {
      content: "";
      position: absolute;
      left: 0; top: 11px;
      width: 4px; height: 4px;
      border-radius: var(--radius-full);
      background: var(--border-medium);
    }

    /* ── Quality tier ladder (refined) ── */
    .quality-ladder {
      margin: var(--space-5) 0;
    }
    .quality-rung {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--bg-secondary);
      border-left: 4px solid transparent;
      border-radius: var(--radius-md);
      margin-bottom: var(--space-1);
      transition: transform var(--transition-fast);
    }
    .quality-rung:hover { transform: translateX(3px); }
    .quality-rung--best { border-left-color: var(--color-success); }
    .quality-rung--high { border-left-color: #EA580C; }
    .quality-rung--med  { border-left-color: var(--zt-challenge); }
    .quality-rung--low  { border-left-color: #78716C; }
    .quality-rung--none { border-left-color: var(--text-tertiary); }
    .quality-rung-rank {
      font-weight: 800;
      font-size: 20px;
      color: var(--text-primary);
      text-align: center;
      line-height: 1;
    }
    .quality-rung-name {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }
    .quality-rung-desc {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .quality-rung-score {
      font-size: 11px;
      font-weight: 700;
      padding: 4px var(--space-3);
      border-radius: var(--radius-full);
      background: var(--bg-primary);
      color: var(--text-secondary);
      border: 1px solid var(--border-light);
      white-space: nowrap;
    }

    /* ── Process trio (collector / enricher / inference) ── */
    .process-trio {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4);
      margin: var(--space-5) 0;
    }
    @media (max-width: 768px) {
      .process-trio { grid-template-columns: 1fr; }
    }
    .process-col {
      padding: var(--space-5);
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      transition: border-color var(--transition-fast);
    }
    .process-col:hover { border-color: var(--border-brand); }
    .process-col-head {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-3);
      border-bottom: 1px solid var(--border-light);
    }
    .process-col-dot {
      width: 10px; height: 10px;
      border-radius: var(--radius-full);
      flex-shrink: 0;
    }
    .process-col--collect .process-col-dot { background: var(--brand-primary); }
    .process-col--enrich .process-col-dot { background: var(--brand-secondary); }
    .process-col--infer  .process-col-dot { background: var(--zt-challenge); }
    .process-col-title {
      font-weight: 700;
      font-size: var(--text-sm);
      color: var(--text-primary);
    }
    .process-col ul {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: var(--leading-loose);
    }
    .process-col ul li {
      padding: 2px 0 2px var(--space-3);
      position: relative;
    }
    .process-col ul li::before {
      content: "";
      position: absolute;
      left: 0; top: 10px;
      width: 4px; height: 4px;
      border-radius: var(--radius-full);
      background: var(--border-medium);
    }

    /* ── Anatomy split (system / user) ── */
    .anatomy-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      margin: var(--space-5) 0;
    }
    @media (max-width: 768px) {
      .anatomy-split { grid-template-columns: 1fr; }
    }
    .anatomy-panel {
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .anatomy-head {
      padding: var(--space-3) var(--space-4);
      font-weight: 700;
      font-size: 11px;
      color: #fff;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .anatomy-head--sys {
      background: linear-gradient(135deg, var(--brand-primary), #4F46E5);
    }
    .anatomy-head--usr {
      background: linear-gradient(135deg, var(--brand-secondary), #9333EA);
    }
    .anatomy-body {
      padding: var(--space-4) var(--space-5);
      font-size: 12px;
      color: var(--text-secondary);
      line-height: var(--leading-relaxed);
    }
    .anatomy-body p {
      margin: 0 0 var(--space-3);
      font-size: 12px;
    }
    .anatomy-body ol {
      margin: 0;
      padding-left: var(--space-5);
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-primary);
    }
    .anatomy-body ol li { margin-bottom: 3px; }

    /* ── Canonical record layout ── */
    .canonical-layout {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-3);
      margin: var(--space-5) 0;
    }
    @media (max-width: 900px) {
      .canonical-layout { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .canonical-layout { grid-template-columns: 1fr; }
    }
    .canonical-cell {
      padding: var(--space-4);
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      border-top: 2px solid var(--brand-primary);
      transition: transform var(--transition-fast);
    }
    .canonical-cell:hover { transform: translateY(-2px); }
    .canonical-cell h4 {
      font-size: 11px;
      font-weight: 800;
      color: var(--brand-primary);
      margin: 0 0 var(--space-2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .canonical-cell ul {
      list-style: none;
      padding: 0;
      margin: 0;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      line-height: var(--leading-loose);
    }

    /* ── Coverage meter ── */
    .coverage-meter {
      margin: var(--space-5) 0;
      max-width: 720px;
    }
    .coverage-row {
      display: grid;
      grid-template-columns: 180px 1fr auto;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      background: var(--bg-secondary);
      margin-bottom: var(--space-2);
      font-size: 12px;
      transition: transform var(--transition-fast);
    }
    .coverage-row:hover { transform: translateX(3px); }
    @media (max-width: 640px) {
      .coverage-row { grid-template-columns: 1fr; gap: var(--space-2); }
    }
    .coverage-label {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }
    .coverage-bar {
      position: relative;
      height: 8px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .coverage-fill {
      position: absolute;
      inset: 0 auto 0 0;
      border-radius: var(--radius-full);
    }
    .coverage-fill--best { background: var(--color-success); right: 0; }
    .coverage-fill--good { background: #EA580C; right: 30%; }
    .coverage-fill--ok   { background: var(--zt-challenge); right: 55%; }
    .coverage-fill--poor { background: var(--text-tertiary); right: 80%; }
    .coverage-note {
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* ── Section builder grid ── */
    .builder-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-3);
      margin: var(--space-5) 0;
    }
    @media (max-width: 900px) {
      .builder-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 640px) {
      .builder-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 420px) {
      .builder-grid { grid-template-columns: 1fr; }
    }
    .builder-tile {
      position: relative;
      padding: var(--space-4);
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      transition: border-color var(--transition-fast), transform var(--transition-fast);
    }
    .builder-tile:hover {
      transform: translateY(-1px);
      border-color: var(--border-brand);
    }
    .builder-tile--system {
      background: var(--brand-primary-light);
      border-color: var(--border-brand);
    }
    .builder-tile-tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: var(--radius-sm);
      color: #fff;
      margin-bottom: var(--space-2);
      letter-spacing: 0.08em;
    }
    .builder-tile-tag--sys { background: var(--brand-primary); }
    .builder-tile-tag--usr { background: var(--brand-secondary); }
    .builder-tile-name {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-1);
      line-height: var(--leading-snug);
    }
    .builder-tile-desc {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: var(--leading-relaxed);
    }

    /* ── Guardrail flow (replaces broken lever-chart) ── */
    .guardrail-flow {
      display: grid;
      grid-template-columns: 1fr;
      margin: var(--space-5) 0;
    }
    .guardrail-track {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-2);
      padding: var(--space-5) var(--space-3);
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      position: relative;
    }
    @media (max-width: 640px) {
      .guardrail-track { flex-direction: column; gap: var(--space-4); }
    }
    .guardrail-node {
      flex: 1;
      min-width: 0;
      text-align: center;
      padding: var(--space-3) var(--space-2);
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      position: relative;
    }
    .guardrail-node--allow  { border-top: 3px solid var(--zt-allow); }
    .guardrail-node--chall  { border-top: 3px solid var(--zt-challenge); }
    .guardrail-node--escal  { border-top: 3px solid var(--zt-block); }
    .guardrail-action {
      display: block;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 13px;
      color: var(--text-primary);
      margin-bottom: 3px;
      letter-spacing: 0.03em;
    }
    .guardrail-label {
      font-size: 10px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .guardrail-arrow {
      flex: 0 0 auto;
      font-size: 20px;
      color: var(--brand-primary);
      font-weight: 700;
      line-height: 1;
    }
    @media (max-width: 640px) {
      .guardrail-arrow { transform: rotate(90deg); }
    }
    .guardrail-caption {
      margin-top: var(--space-3);
      text-align: center;
      font-size: 11px;
      color: var(--text-tertiary);
      font-style: italic;
    }

    /* ── Final outcome matrix ── */
    .outcome-frame {
      padding: var(--space-5);
      background: var(--brand-gradient-subtle);
      border: 1px solid var(--border-brand);
      border-radius: var(--radius-xl);
      margin: var(--space-5) 0;
    }
    .outcome-frame h3 {
      font-size: var(--text-base);
      font-weight: 700;
      margin: 0 0 var(--space-4);
      color: var(--text-primary);
    }
    .outcome-matrix {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-3);
    }
    @media (max-width: 640px) {
      .outcome-matrix { grid-template-columns: 1fr; }
    }
    .outcome-field {
      padding: var(--space-3) var(--space-4);
      background: var(--bg-primary);
      border-radius: var(--radius-md);
      border-left: 3px solid var(--brand-primary);
    }
    .outcome-field-name {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 2px;
      letter-spacing: 0.02em;
    }
    .outcome-field-desc {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: var(--leading-relaxed);
    }

    /* ── Persona compare ── */
    .persona-compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      margin: var(--space-5) 0;
    }
    @media (max-width: 768px) {
      .persona-compare { grid-template-columns: 1fr; }
    }
    .persona-col {
      padding: var(--space-5);
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      position: relative;
      overflow: hidden;
    }
    .persona-col::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .persona-col--human::before { background: var(--brand-primary); }
    .persona-col--agent::before { background: var(--zt-challenge); }
    .persona-col-title {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-3);
      border-bottom: 1px solid var(--border-light);
    }
    .persona-col-icon {
      width: 32px; height: 32px;
      border-radius: var(--radius-full);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      font-size: 13px;
    }
    .persona-col--human .persona-col-icon { background: var(--brand-primary); }
    .persona-col--agent .persona-col-icon { background: var(--zt-challenge); }
    .persona-col-name {
      font-weight: 700;
      font-size: var(--text-base);
      color: var(--text-primary);
    }
    .persona-table {
      width: 100%;
      font-size: 12px;
      border-collapse: collapse;
    }
    .persona-table tr {
      border-bottom: 1px solid var(--border-light);
    }
    .persona-table tr:last-child { border-bottom: none; }
    .persona-table th {
      text-align: left;
      padding: var(--space-2) 0;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      width: 35%;
    }
    .persona-table td {
      padding: var(--space-2) 0;
      color: var(--text-secondary);
    }

    /* ── Calibration list ── */
    .calib-list {
      list-style: none;
      padding: 0;
      margin: var(--space-5) 0;
    }
    .calib-list li {
      padding: var(--space-3) var(--space-4);
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-2);
      font-size: var(--text-sm);
      line-height: var(--leading-relaxed);
      color: var(--text-secondary);
      border-left: 3px solid var(--border-medium);
      transition: border-color var(--transition-fast);
    }
    .calib-list li:hover { border-left-color: var(--brand-primary); }
    .calib-list li strong {
      color: var(--text-primary);
      font-weight: 700;
    }
  </style>
</head>
<body>
  {{header}}
  <main class="site-main">
    <div class="docs-layout">
      {{sidebar}}
      <div class="docs-content">
        <div class="docs-content-inner">
          {{content}}
        </div>
      </div>
    </div>
  </main>
  {{footer}}
  <script src="/assets/js/nav.js"></script>
  <script src="/assets/js/sidebar.js"></script>
  <script src="/assets/js/code-highlight.js"></script>
  <script src="/assets/js/docs-search.js"></script>
  <script src="/assets/js/docs-toc.js"></script>
</body></html>
