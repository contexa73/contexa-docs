<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HCAD Early Threat Detection | Contexa Docs</title>
  <meta name="description" content="How Contexa's HCAD engine spots suspicious requests the moment they arrive and asks the AI pipeline to start analysing early, before the request ever reaches a @Protectable resource.">
  <link rel="stylesheet" href="/assets/css/fonts.css">
  <link rel="stylesheet" href="/assets/css/variables.css">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/code.css">
  <link rel="stylesheet" href="/assets/css/docs.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
  <style>
    /* ── HCAD Early Detection page styles ── */
    .arch-flow {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin: var(--space-6) 0;
    }
    .arch-flow-node {
      padding: var(--space-3) var(--space-5);
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: var(--text-sm);
      text-align: center;
      max-width: 520px;
      width: 100%;
      line-height: var(--leading-snug);
    }
    .arch-flow-node--primary {
      background: var(--brand-primary);
      color: white;
    }
    .arch-flow-node--secondary {
      background: var(--brand-secondary);
      color: white;
    }
    .arch-flow-node--filter {
      background: var(--bg-secondary);
      border: 1px solid var(--border-medium);
      color: var(--text-primary);
    }
    .arch-flow-node--agent {
      background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(6,182,212,0.08));
      border: 1px solid rgba(99,102,241,0.25);
      color: var(--text-primary);
    }
    .arch-flow-node--decision {
      background: linear-gradient(135deg, rgba(217,119,6,0.08), rgba(220,38,38,0.08));
      border: 1px solid rgba(217,119,6,0.35);
      color: var(--text-primary);
    }
    .arch-flow-connector {
      width: 2px;
      height: var(--space-5);
      background: var(--border-medium);
    }
    .arch-flow-detail {
      display: block;
      font-size: var(--text-xs);
      font-weight: 400;
      color: var(--text-secondary);
      margin-top: var(--space-2);
      line-height: var(--leading-relaxed);
    }
    .arch-flow-badge {
      display: inline-block;
      margin-top: var(--space-3);
      padding: var(--space-1) var(--space-4);
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
      color: white;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    /* Signal cards */
    .signal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: var(--space-3);
      margin: var(--space-4) 0;
    }
    .signal-card {
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      background: var(--bg-primary);
    }
    .signal-card--anchor {
      border-left: 4px solid var(--zt-block);
    }
    .signal-card--corroborating {
      border-left: 4px solid var(--zt-challenge);
    }
    .signal-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-2);
    }
    .signal-card-name {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      font-weight: 700;
      color: var(--text-primary);
    }
    .signal-card-weight {
      font-size: var(--text-xs);
      font-weight: 700;
      padding: 2px var(--space-2);
      border-radius: var(--radius-full);
      background: var(--bg-secondary);
      color: var(--text-primary);
    }
    .signal-card-desc {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: var(--leading-relaxed);
    }

    /* Band table */
    .band-table {
      width: 100%;
      border-collapse: collapse;
      margin: var(--space-4) 0;
      font-size: var(--text-sm);
    }
    .band-table th,
    .band-table td {
      text-align: left;
      padding: var(--space-2) var(--space-3);
      border-bottom: 1px solid var(--border-light);
    }
    .band-table th {
      font-weight: 600;
      border-bottom: 2px solid var(--border-medium);
    }
    .band-chip {
      display: inline-block;
      padding: 2px var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 700;
      color: white;
    }
    .band-chip--low { background: var(--zt-allow); }
    .band-chip--medium { background: var(--zt-pending); }
    .band-chip--high { background: var(--zt-challenge); }
    .band-chip--redline { background: var(--zt-block); }

    /* Filter chain */
    .filter-chain {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin: var(--space-4) 0;
    }
    .filter-chain-item {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-3);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      background: var(--bg-primary);
    }
    .filter-chain-order {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: rgba(99,102,241,0.1);
      color: var(--brand-primary);
      font-weight: 700;
      font-size: var(--text-sm);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .filter-chain-body { flex: 1; }
    .filter-chain-name {
      font-weight: 600;
      font-size: var(--text-sm);
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    .filter-chain-desc {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: var(--leading-relaxed);
    }
    .filter-chain-connector {
      align-self: center;
      color: var(--border-medium);
      font-size: var(--text-xs);
      padding: 2px 0;
    }

    /* Signal dimension pills */
    .dimension-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: var(--space-3);
      margin: var(--space-4) 0;
    }
    .dimension-card {
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      background: var(--bg-secondary);
    }
    .dimension-card h4 {
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--text-primary);
      margin: 0 0 var(--space-2);
    }
    .dimension-card ul {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: var(--text-xs);
      font-family: var(--font-mono);
      color: var(--text-secondary);
      line-height: var(--leading-loose);
    }

    /* Payload table */
    .payload-table {
      width: 100%;
      border-collapse: collapse;
      margin: var(--space-4) 0;
      font-size: var(--text-sm);
    }
    .payload-table th,
    .payload-table td {
      text-align: left;
      padding: var(--space-2) var(--space-3);
      border-bottom: 1px solid var(--border-light);
      vertical-align: top;
    }
    .payload-table th {
      font-weight: 600;
      border-bottom: 2px solid var(--border-medium);
    }
    .payload-table code {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      background: var(--bg-code-inline);
      padding: 1px var(--space-2);
      border-radius: var(--radius-sm);
    }

    /* ── Score ruler (0~100 scale with band zones) ── */
    .score-ruler {
      position: relative;
      width: 100%;
      margin: var(--space-6) 0 var(--space-8);
      padding: 0 var(--space-2);
    }
    .score-ruler-track {
      position: relative;
      width: 100%;
      height: 44px;
      border-radius: var(--radius-full);
      background: linear-gradient(
        to right,
        #22c55e 0%,
        #22c55e 30%,
        #f59e0b 30%,
        #f59e0b 50%,
        #ea580c 50%,
        #ea580c 70%,
        #dc2626 70%,
        #dc2626 100%
      );
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.08);
    }
    .score-ruler-scale {
      position: relative;
      width: 100%;
      margin-top: var(--space-2);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-tertiary);
      height: 18px;
    }
    .score-ruler-tick {
      position: absolute;
      transform: translateX(-50%);
      top: 0;
    }
    .score-ruler-labels {
      display: flex;
      justify-content: space-between;
      margin-top: var(--space-4);
      font-size: var(--text-xs);
      font-weight: 700;
      color: white;
      position: absolute;
      inset: 0;
      align-items: center;
      padding: 0 var(--space-3);
      pointer-events: none;
    }
    .score-ruler-marker {
      position: absolute;
      top: -6px;
      bottom: -6px;
      width: 3px;
      background: var(--text-primary);
      border-radius: 2px;
      box-shadow: 0 0 0 2px white;
    }
    .score-ruler-marker::after {
      content: attr(data-label);
      position: absolute;
      top: -26px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
      background: var(--bg-primary);
      padding: 2px var(--space-2);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-medium);
    }

    /* ── Weight bar chart ── */
    .weight-chart {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      margin: var(--space-4) 0;
    }
    .weight-bar-row {
      display: grid;
      grid-template-columns: 220px 1fr 48px;
      align-items: center;
      gap: var(--space-3);
      font-size: var(--text-sm);
    }
    .weight-bar-label {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .weight-bar-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: var(--radius-sm);
      color: white;
    }
    .weight-bar-tag--anchor { background: var(--zt-block); }
    .weight-bar-tag--corr { background: var(--zt-challenge); }
    .weight-bar-track {
      position: relative;
      width: 100%;
      height: 20px;
      background: var(--bg-secondary);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .weight-bar-fill {
      height: 100%;
      border-radius: var(--radius-full);
      transition: width 0.3s ease;
    }
    .weight-bar-fill--anchor {
      background: linear-gradient(90deg, var(--zt-block), #ef4444);
    }
    .weight-bar-fill--corr {
      background: linear-gradient(90deg, var(--zt-challenge), #fbbf24);
    }
    .weight-bar-value {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      text-align: right;
    }
    @media (max-width: 640px) {
      .weight-bar-row { grid-template-columns: 1fr; gap: var(--space-1); }
      .weight-bar-value { text-align: left; }
    }

    /* ── Timeline comparison (as-is vs with-HCAD) ── */
    .timeline-compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      margin: var(--space-6) 0;
    }
    @media (max-width: 768px) {
      .timeline-compare { grid-template-columns: 1fr; }
    }
    .timeline-col {
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      background: var(--bg-primary);
    }
    .timeline-col--baseline {
      border-top: 4px solid var(--text-tertiary);
    }
    .timeline-col--hcad {
      border-top: 4px solid var(--brand-primary);
    }
    .timeline-col-title {
      font-weight: 700;
      font-size: var(--text-sm);
      margin-bottom: var(--space-3);
      color: var(--text-primary);
    }
    .timeline-track {
      position: relative;
      height: 46px;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: var(--space-3);
    }
    .timeline-seg {
      position: absolute;
      top: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: white;
      white-space: nowrap;
      padding: 0 var(--space-2);
    }
    .timeline-seg--auth { background: var(--brand-secondary); }
    .timeline-seg--filter { background: #06b6d4; }
    .timeline-seg--wait { background: #94a3b8; }
    .timeline-seg--analyze { background: var(--brand-primary); }
    .timeline-seg--decide { background: var(--zt-block); }
    .timeline-legend {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      font-size: 11px;
      color: var(--text-secondary);
    }
    .timeline-legend-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: var(--radius-sm);
      vertical-align: middle;
      margin-right: 4px;
    }

    /* ── Dimension wheel (9 signal categories) ── */
    .dimension-wheel {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-3);
      margin: var(--space-6) 0;
    }
    @media (max-width: 640px) {
      .dimension-wheel { grid-template-columns: 1fr; }
    }
    .dimension-hex {
      position: relative;
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(99,102,241,0.04), rgba(6,182,212,0.04));
      border: 1px solid var(--border-light);
      text-align: center;
    }
    .dimension-hex-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
      color: white;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-2);
    }
    .dimension-hex-title {
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }
    .dimension-hex-items {
      list-style: none;
      padding: 0;
      margin: 0;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      line-height: var(--leading-loose);
    }

    /* ── Orchestrator gate chain ── */
    .gate-chain {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0;
      margin: var(--space-6) 0;
      position: relative;
    }
    @media (max-width: 768px) {
      .gate-chain { grid-template-columns: 1fr; gap: var(--space-2); }
    }
    .gate-step {
      position: relative;
      background: var(--bg-primary);
      border: 2px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      text-align: center;
    }
    .gate-step:not(:last-child)::after {
      content: "→";
      position: absolute;
      top: 50%;
      right: -14px;
      transform: translateY(-50%);
      color: var(--brand-primary);
      font-size: 18px;
      font-weight: 700;
      z-index: 1;
    }
    @media (max-width: 768px) {
      .gate-step:not(:last-child)::after {
        content: "↓";
        top: auto;
        bottom: -18px;
        right: 50%;
        transform: translateX(50%);
      }
    }
    .gate-step-num {
      display: inline-block;
      width: 24px;
      height: 24px;
      border-radius: var(--radius-full);
      background: var(--brand-primary);
      color: white;
      font-weight: 700;
      font-size: 12px;
      line-height: 24px;
      margin-bottom: var(--space-2);
    }
    .gate-step-name {
      font-weight: 700;
      font-size: 12px;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .gate-step-desc {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: var(--leading-relaxed);
    }

    /* ── Status matrix 2-column ── */
    .status-matrix {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0;
      margin: var(--space-4) 0;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .status-matrix-row {
      display: contents;
    }
    .status-matrix-cell {
      padding: var(--space-3);
      border-bottom: 1px solid var(--border-light);
      font-size: var(--text-sm);
    }
    .status-matrix-row:last-child .status-matrix-cell { border-bottom: none; }
    .status-matrix-key {
      background: var(--bg-secondary);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
    }

    /* ── Journey arc (HTTP entry to downstream LLM) ── */
    .journey-arc {
      display: flex;
      align-items: stretch;
      gap: 0;
      margin: var(--space-6) 0;
      overflow-x: auto;
      padding: var(--space-2) 0;
    }
    .journey-node {
      flex: 1;
      min-width: 140px;
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      text-align: center;
      position: relative;
    }
    .journey-node:not(:last-child)::after {
      content: "";
      position: absolute;
      right: -14px;
      top: 50%;
      width: 0;
      height: 0;
      border-left: 14px solid var(--brand-primary);
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      transform: translateY(-50%);
      z-index: 1;
    }
    .journey-node:not(:last-child) { margin-right: var(--space-3); }
    .journey-node-stage {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--brand-primary);
      margin-bottom: var(--space-1);
    }
    .journey-node-name {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-1);
    }
    .journey-node-desc {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: var(--leading-relaxed);
    }

    /* Mode split */
    .mode-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-4);
      margin: var(--space-6) 0;
    }
    @media (max-width: 640px) {
      .mode-cards { grid-template-columns: 1fr; }
    }
    .mode-card {
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      background: var(--bg-primary);
    }
    .mode-card h3 {
      font-size: var(--text-base);
      font-weight: 700;
      margin: 0 0 var(--space-2);
    }
    .mode-card p {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      margin: 0 0 var(--space-3);
    }
    .mode-card code {
      display: inline-block;
      background: var(--bg-code-inline);
      padding: 1px var(--space-2);
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
    }
  </style>
</head>
<body>
  <!-- Site Header -->
  {{header}}

  <main class="site-main">
    <div class="docs-layout">
      <!-- Sidebar -->
      {{sidebar}}

      <!-- Main Content -->
      <div class="docs-content">
        <div class="docs-content-inner">
          {{content}}
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  {{footer}}

  <script src="/assets/js/nav.js"></script>
  <script src="/assets/js/sidebar.js"></script>
  <script src="/assets/js/code-highlight.js"></script>
  <script src="/assets/js/docs-search.js"></script>
  <script src="/assets/js/docs-toc.js"></script>
</body></html>
